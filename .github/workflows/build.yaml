name: CI

# Windows is intentionally omitted from the build matrix: the coordinator uses
# syscall.Flock (unix-only).
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: linux,  goarch: arm,   goarm: '7' }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o dist/wgcoord ./cmd/wgcoord

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wgcoord-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7
